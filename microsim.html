<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro-Simulazioni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #f8faff;
      --card:        #ffffff;
      --blue:        #1a56db;
      --blue-lt:     #3b82f6;
      --blue-dk:     #1e40af;
      --cyan:        #0891B2;
      --teal:        #0D9488;
      --emerald:     #10b981;
      --red:         #ef4444;
      --green:       #10b981;
      --text:        #0f1f3d;
      --text-dim:    #5b6b8c;
      --text-muted:  #5b6b8c;
      --text-mute:   #94a3b8;
      --border:      rgba(26,86,219,.20);
      --border-soft: rgba(26,86,219,.10);
      --white:       #ffffff;
    }
    html, body { min-height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #1a4fc4 0%, #0a82b8 55%, #0d8c7e 100%);
      padding: 20px 48px; display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 24px rgba(26,86,219,.30);
    }
    .header-left { display: flex; align-items: center; gap: 24px; }
    .back-link { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,.65); text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: #fff; }
    .header-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
    .header-badge { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #fff; background: rgba(255,255,255,.20); border: 1px solid rgba(255,255,255,.35); padding: 5px 14px; border-radius: 100px; }

    .wrapper { max-width: 820px; margin: 0 auto; padding: 60px 32px; }

    /* ── SELEZIONE TEMA ── */
    #select-screen h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 36px; font-weight: 800; color: var(--text); margin-bottom: 12px; letter-spacing: -.5px; }
    #select-screen p { font-size: 15px; color: var(--text-dim); margin-bottom: 48px; line-height: 1.6; }
    .temi-select-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .tema-select-card {
      background: var(--card); border: 1.5px solid var(--border); border-radius: 16px;
      padding: 28px 24px; cursor: pointer; transition: all 0.25s;
      box-shadow: 0 2px 8px rgba(26,86,219,.07);
    }
    .tema-select-card:hover { border-color: var(--blue); transform: translateY(-4px); box-shadow: 0 12px 32px rgba(26,86,219,.16); }
    .tema-icon { font-size: 28px; margin-bottom: 12px; }
    .tema-select-name { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px; letter-spacing: -.2px; }
    .tema-count { font-size: 12px; color: var(--text-mute); }

    /* ── QUIZ ── */
    #quiz-screen { display: none; }
    .progress-bar-wrap { background: var(--border-soft); border-radius: 4px; height: 4px; margin-bottom: 40px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(to right, var(--blue), var(--cyan)); border-radius: 4px; transition: width 0.4s ease; }
    .question-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .q-number { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--blue); }
    .q-tema { font-size: 11px; font-weight: 600; color: var(--blue-dk); background: rgba(26,86,219,.10); border: 1px solid rgba(26,86,219,.18); padding: 4px 12px; border-radius: 100px; }
    .q-timer { font-size: 13px; font-weight: 600; color: var(--text-mute); }
    .question-text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.5; margin-bottom: 36px; letter-spacing: -.2px; }
    .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
    .option-btn { display: flex; align-items: flex-start; gap: 16px; padding: 18px 22px; background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer; text-align: left; font-family: 'Inter', sans-serif; font-size: 15px; color: var(--text); transition: all 0.2s; line-height: 1.5; }
    .option-btn:hover:not(:disabled) { border-color: var(--blue); background: rgba(26,86,219,.04); }
    .option-btn .letter { font-size: 12px; font-weight: 700; color: var(--blue); min-width: 22px; height: 22px; background: rgba(26,86,219,.10); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .option-btn.correct { background: rgba(16,185,129,.08); border-color: var(--emerald); }
    .option-btn.correct .letter { background: var(--emerald); color: white; }
    .option-btn.wrong { background: rgba(239,68,68,.07); border-color: var(--red); }
    .option-btn.wrong .letter { background: var(--red); color: white; }
    .option-btn:disabled { cursor: default; }
    .feedback-row { display: flex; justify-content: flex-end; }
    .btn-next { padding: 14px 40px; background: linear-gradient(135deg, var(--blue), var(--cyan)); color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: none; transition: all 0.3s; }
    .btn-next:hover { opacity: .9; transform: translateY(-1px); }

    /* ── RESULT ── */
    #result-screen { display: none; text-align: center; }
    .result-circle { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--blue); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; background: white; box-shadow: 0 0 0 8px rgba(26,86,219,.08); }
    .result-pct { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 40px; font-weight: 800; color: var(--blue); }
    .result-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: -.3px; }
    .result-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 40px; }
    .errori-list { display: flex; flex-direction: column; gap: 14px; text-align: left; margin-bottom: 40px; }
    .errore-card { background: white; border: 1px solid rgba(239,68,68,.20); border-left: 4px solid var(--red); border-radius: 12px; padding: 18px 22px; }
    .errore-domanda { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 10px; line-height: 1.4; }
    .errore-row { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; margin-bottom: 5px; }
    .errore-badge { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; }
    .badge-wrong { background: rgba(239,68,68,.10); color: var(--red); }
    .badge-correct { background: rgba(16,185,129,.10); color: var(--emerald); }
    .btn-group { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-retry { padding: 14px 36px; background: linear-gradient(135deg, var(--blue), var(--cyan)); color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: opacity .2s; }
    .btn-retry:hover { opacity: .9; }
    .btn-back { padding: 14px 36px; background: transparent; color: var(--text); border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all .2s; }
    .btn-back:hover { border-color: var(--blue); color: var(--blue); }

    @media (max-width: 600px) { .header { padding: 16px 20px; } .wrapper { padding: 40px 20px; } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <a href="index.html" class="back-link" id="back-link">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L4 7l5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Dashboard
      </a>
      <div class="header-title">Micro-Simulazioni</div>
    </div>
    <div class="header-badge">15 Domande</div>
  </div>

  <div class="wrapper">
    <!-- SELEZIONE TEMA -->
    <div id="select-screen">
      <h1>Scegli un<br/>Macrotema</h1>
      <p>Allenati su un argomento specifico con 15 domande selezionate casualmente da quell'area.</p>
      <div class="temi-select-grid" id="temi-grid">
        <div style="color:var(--text-mute)">Caricamento...</div>
      </div>
    </div>

    <!-- QUIZ -->
    <div id="quiz-screen">
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="question-meta">
        <div class="q-number" id="q-number">—</div>
        <div class="q-tema" id="q-tema">—</div>
        <div class="q-timer" id="q-timer">0s</div>
      </div>
      <div class="question-text" id="question-text">...</div>
      <div class="options-list" id="options-list"></div>
      <div class="feedback-row"><button class="btn-next" id="btn-next" onclick="nextQuestion()">Prossima →</button></div>
    </div>

    <!-- RESULTS -->
    <div id="result-screen">
      <div class="result-circle"><div class="result-pct" id="r-pct">0%</div></div>
      <div class="result-title" id="r-title">—</div>
      <div class="result-sub" id="r-sub">—</div>
      <div style="text-align:left; margin-bottom:24px">
        <div style="font-family:'Plus Jakarta Sans',sans-serif; font-size:20px; font-weight:700; color:var(--text); margin-bottom:16px; letter-spacing:-.2px">Domande Sbagliate</div>
        <div class="errori-list" id="r-errori"></div>
      </div>
      <div class="btn-group">
        <button class="btn-retry" onclick="retryTema()">Riprova questo tema</button>
        <button class="btn-back" onclick="backToSelect()">Scegli altro tema</button>
        <button class="btn-back" onclick="window.location.href=dashUrl">Dashboard</button>
      </div>
    </div>
  </div>

  <script>
    if (!localStorage.getItem('auth_user')) window.location.href = 'index.html';

    const SUPABASE_URL = 'https://athqmxqratfyxnhmhwbn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_aVmmITMnZw0aqdxZoDNPkg_9_Cbarpn';

    const authUser   = localStorage.getItem('auth_user')  || '';
    const authGruppo = localStorage.getItem('auth_gruppo') || '';
    const dashUrl    = authGruppo === 'ISP' ? 'dashboard-isp.html' : authGruppo === 'Interaziendale' ? 'dashboard-inter.html' : authGruppo === 'ISP128' ? 'dashboard-isp128.html' : 'index.html';
    document.getElementById('back-link').href = dashUrl;

    const ICONS = {
      'Security & ERM':'🛡️', 'Risk Perception':'👁️', 'Time Management':'⏱️',
      'Project Management':'📊', 'Sicurezza Fisica':'🔐', 'Sicurezza Pubblica':'🚔',
      'Sicurezza Privata':'🏢', 'Sicurezza Urbana':'🏙️', 'Criminologia':'🔍',
      'Crisis Management':'🚨', 'Organizzazione Aziendale':'📋', 'Economia e Finanza':'💰'
    };

    const NUM_QUESTIONS = 15;
    let rawData = {}, allQuestions = [], currentTema = '', testQuestions = [], currentIndex = 0, answers = [];
    let timerInterval, questionStartTime;

    fetch('domande.json?v=' + Date.now())
      .then(r => r.json())
      .then(data => {
        rawData = data;
        allQuestions = Object.entries(data).flatMap(([cat, qs]) => qs.map(q => ({ ...q, macrotema: cat })));
        buildTemiGrid();
        const presel = sessionStorage.getItem('microsim_tema');
        if (presel) { sessionStorage.removeItem('microsim_tema'); startTema(presel); }
      });

    function buildTemiGrid() {
      const grid = document.getElementById('temi-grid');
      grid.innerHTML = Object.entries(rawData).map(([tema, qs]) => {
        const icon = ICONS[tema] || '📚';
        const safe = tema.replace(/'/g, "\\'");
        return `<div class="tema-select-card" onclick="startTema('${safe}')">
          <div class="tema-icon">${icon}</div>
          <div class="tema-select-name">${tema}</div>
          <div class="tema-count">${qs.length} domande disponibili</div>
        </div>`;
      }).join('');
    }

    function startTema(tema) {
      currentTema = tema;
      const pool = allQuestions.filter(q => q.macrotema === tema);
      testQuestions = shuffle(pool).slice(0, Math.min(NUM_QUESTIONS, pool.length));
      currentIndex = 0; answers = [];
      document.getElementById('select-screen').style.display = 'none';
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      renderQuestion();
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }

    function startTimer() {
      questionStartTime = Date.now(); let secs = 0;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => { secs++; document.getElementById('q-timer').textContent = secs + 's'; }, 1000);
    }

    function renderQuestion() {
      const q = testQuestions[currentIndex];
      document.getElementById('progress-bar').style.width = ((currentIndex / testQuestions.length) * 100) + '%';
      document.getElementById('q-number').textContent = `Domanda ${currentIndex + 1} / ${testQuestions.length}`;
      document.getElementById('q-tema').textContent = q.macrotema || '';
      document.getElementById('q-timer').textContent = '0s';
      document.getElementById('question-text').textContent = q.domanda;
      document.getElementById('btn-next').style.display = 'none';
      startTimer();

      const list = document.getElementById('options-list');
      list.innerHTML = '';
      shuffle([...q.opzioni]).forEach((text, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.dataset.text = text;
        btn.innerHTML = `<span class="letter">${String.fromCharCode(65 + i)}</span><span>${text}</span>`;
        btn.onclick = () => selectAnswer(btn, q);
        list.appendChild(btn);
      });
    }

    function selectAnswer(clickedBtn, q) {
      clearInterval(timerInterval);
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      const ok = clickedBtn.dataset.text === q.risposta_corretta;
      clickedBtn.classList.add(ok ? 'correct' : 'wrong');
      if (!ok) document.querySelectorAll('.option-btn').forEach(b => { if (b.dataset.text === q.risposta_corretta) b.classList.add('correct'); });
      answers.push({ correct: ok, domanda: q.domanda, scelta: clickedBtn.dataset.text, corretta: q.risposta_corretta });
      document.getElementById('btn-next').style.display = 'inline-flex';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= testQuestions.length) showResults();
      else renderQuestion();
    }

    function showResults() {
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('result-screen').style.display = 'block';
      const correct = answers.filter(a => a.correct).length;
      const pct = Math.round((correct / answers.length) * 100);
      document.getElementById('r-pct').textContent = pct + '%';
      document.getElementById('r-sub').textContent = `${correct} corrette su ${answers.length} · ${currentTema}`;
      document.getElementById('r-title').textContent = pct >= 85 ? 'Eccellente!' : pct >= 70 ? 'Buon lavoro!' : pct >= 60 ? 'Sufficiente' : 'Continua ad allenarti';
      const errori = answers.filter(a => !a.correct);
      document.getElementById('r-errori').innerHTML = errori.length === 0
        ? `<p style="color:var(--green); font-weight:600">🎉 Nessun errore!</p>`
        : errori.map(e => `<div class="errore-card">
            <div class="errore-domanda">${e.domanda}</div>
            <div class="errore-row"><span class="errore-badge badge-wrong">Tua risposta</span><span style="color:var(--red)">${e.scelta}</span></div>
            <div class="errore-row"><span class="errore-badge badge-correct">Risposta corretta</span><span style="color:var(--green); font-weight:500">${e.corretta}</span></div>
          </div>`).join('');

      const key      = 'alpha_test_results_' + authUser;
      const existing = JSON.parse(localStorage.getItem(key) || '[]');
      existing.push({ tipo: 'micro', corrette: correct, totale: answers.length, pct, ts: Date.now(), tema: currentTema });
      localStorage.setItem(key, JSON.stringify(existing));
      sendToSupabase(authGruppo || null, 'micro', currentTema, correct, answers.length);
    }

    function sendToSupabase(gruppo, tipo, macrotema, punteggio, totale) {
      fetch(SUPABASE_URL + '/rest/v1/risultati', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ gruppo, tipo_simulazione: tipo, macrotema: macrotema || null, punteggio, totale_domande: totale })
      }).catch(e => console.warn('Supabase sync failed:', e));
    }

    function retryTema() { startTema(currentTema); }
    function backToSelect() {
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('select-screen').style.display = 'block';
    }
  </script>
</body>
</html>
