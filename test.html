<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpha Test 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #f8faff;
      --card:        #ffffff;
      --blue:        #1a56db;
      --blue-lt:     #3b82f6;
      --blue-dk:     #1e40af;
      --cyan:        #0891B2;
      --teal:        #0D9488;
      --emerald:     #10b981;
      --red:         #ef4444;
      --green:       #10b981;
      --text:        #0f1f3d;
      --text-dim:    #5b6b8c;
      --text-muted:  #5b6b8c;
      --text-mute:   #94a3b8;
      --border:      rgba(26,86,219,.20);
      --border-soft: rgba(26,86,219,.10);
      --white:       #ffffff;
    }
    html, body { min-height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #1a4fc4 0%, #0a82b8 55%, #0d8c7e 100%);
      padding: 20px 48px; display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 24px rgba(26,86,219,.30);
    }
    .header-left { display: flex; align-items: center; gap: 24px; }
    .back-link { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,.65); text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: #fff; }
    .header-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
    .header-badge { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #fff; background: rgba(255,255,255,.20); border: 1px solid rgba(255,255,255,.35); padding: 5px 14px; border-radius: 100px; }

    .wrapper { max-width: 820px; margin: 0 auto; padding: 60px 32px; }

    /* ── START SCREEN ── */
    #start-screen { text-align: center; padding: 60px 0; }
    #start-screen h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 48px; font-weight: 800; color: var(--text); margin-bottom: 16px; letter-spacing: -.8px; line-height: 1.15; }
    #start-screen p { font-size: 16px; color: var(--text-dim); line-height: 1.7; max-width: 480px; margin: 0 auto 48px; }
    .info-boxes { display: flex; justify-content: center; gap: 20px; margin-bottom: 48px; flex-wrap: wrap; }
    .info-box { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 24px 32px; text-align: center; min-width: 130px; box-shadow: 0 2px 8px rgba(26,86,219,.07); }
    .info-box .num { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 36px; font-weight: 800; color: var(--blue); line-height: 1; margin-bottom: 6px; }
    .info-box .lbl { font-size: 11px; font-weight: 600; color: var(--text-mute); letter-spacing: 1px; text-transform: uppercase; }
    .btn-start { display: inline-flex; align-items: center; gap: 10px; padding: 18px 48px; background: linear-gradient(135deg, var(--blue), var(--cyan)); color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 20px rgba(26,86,219,.35); }
    .btn-start:hover { opacity: .9; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(26,86,219,.45); }

    /* ── QUIZ ── */
    #quiz-screen { display: none; }
    .progress-bar-wrap { background: var(--border-soft); border-radius: 4px; height: 4px; margin-bottom: 40px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(to right, var(--blue), var(--cyan)); border-radius: 4px; transition: width 0.4s ease; }
    .question-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .q-number { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--blue); }
    .q-tema { font-size: 11px; font-weight: 600; color: var(--blue-dk); background: rgba(26,86,219,.10); border: 1px solid rgba(26,86,219,.18); padding: 4px 12px; border-radius: 100px; }
    .q-timer { font-size: 13px; font-weight: 600; color: var(--text-mute); min-width: 48px; text-align: right; }
    .question-text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.5; margin-bottom: 36px; letter-spacing: -.2px; }
    .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
    .option-btn { display: flex; align-items: flex-start; gap: 16px; padding: 18px 22px; background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer; text-align: left; font-family: 'Inter', sans-serif; font-size: 15px; color: var(--text); transition: all 0.2s; line-height: 1.5; }
    .option-btn:hover:not(:disabled) { border-color: var(--blue); background: rgba(26,86,219,.04); }
    .option-btn .letter { font-size: 12px; font-weight: 700; color: var(--blue); min-width: 22px; height: 22px; background: rgba(26,86,219,.10); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .option-btn.correct { background: rgba(16,185,129,.08); border-color: var(--emerald); }
    .option-btn.correct .letter { background: var(--emerald); color: white; }
    .option-btn.wrong { background: rgba(239,68,68,.07); border-color: var(--red); }
    .option-btn.wrong .letter { background: var(--red); color: white; }
    .option-btn:disabled { cursor: default; }
    .feedback-row { display: flex; justify-content: flex-end; }
    .btn-next { padding: 14px 40px; background: linear-gradient(135deg, var(--blue), var(--cyan)); color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: none; transition: all 0.3s; }
    .btn-next:hover { opacity: .9; transform: translateY(-1px); }

    /* ── RESULT ── */
    #result-screen { display: none; }
    .result-header { text-align: center; margin-bottom: 48px; }
    .result-circle { width: 160px; height: 160px; border-radius: 50%; border: 3px solid var(--blue); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 24px; background: white; box-shadow: 0 0 0 10px rgba(26,86,219,.08); }
    .result-pct { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 48px; font-weight: 800; color: var(--blue); line-height: 1; }
    .result-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 32px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: -.4px; }
    .result-sub { font-size: 15px; color: var(--text-dim); }
    .section-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 20px; margin-top: 48px; letter-spacing: -.3px; }
    .temi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .tema-box { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 20px 22px; box-shadow: 0 2px 8px rgba(26,86,219,.06); }
    .tema-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; letter-spacing: -.1px; }
    .tema-score { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .tema-detail { font-size: 11px; color: var(--text-mute); margin-bottom: 8px; }
    .tema-bar { height: 4px; background: var(--border-soft); border-radius: 2px; overflow: hidden; }
    .tema-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
    .microsim-suggest { background: linear-gradient(135deg, #1a4fc4 0%, #0a82b8 60%, #0d8c7e 100%); border-radius: 16px; padding: 28px 32px; margin-bottom: 40px; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; box-shadow: 0 4px 24px rgba(26,86,219,.25); }
    .microsim-suggest .txt { color: rgba(255,255,255,.85); font-size: 14px; line-height: 1.6; }
    .microsim-suggest strong { color: #fde68a; display: block; font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .btn-microsim { padding: 12px 28px; background: rgba(255,255,255,.22); border: 1px solid rgba(255,255,255,.4); color: #fff; border-radius: 10px; font-size: 12px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; cursor: pointer; white-space: nowrap; transition: background 0.25s; }
    .btn-microsim:hover { background: rgba(255,255,255,.35); }
    .errori-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 48px; }
    .errore-card { background: var(--card); border: 1px solid rgba(239,68,68,.20); border-left: 4px solid var(--red); border-radius: 12px; padding: 20px 24px; }
    .errore-domanda { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px; line-height: 1.4; }
    .errore-row { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; margin-bottom: 6px; }
    .errore-badge { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; margin-top: 1px; }
    .badge-wrong { background: rgba(239,68,68,.10); color: var(--red); }
    .badge-correct { background: rgba(16,185,129,.10); color: var(--emerald); }
    .errore-tema { font-size: 11px; color: var(--text-mute); margin-top: 8px; }
    .btn-group { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
    .btn-retry { padding: 16px 40px; background: linear-gradient(135deg, var(--blue), var(--cyan)); color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: opacity .2s; }
    .btn-retry:hover { opacity: .9; }
    .btn-dash { padding: 16px 40px; background: transparent; color: var(--text); border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all .2s; }
    .btn-dash:hover { border-color: var(--blue); color: var(--blue); }

    @media (max-width: 600px) { .header { padding: 16px 20px; } .wrapper { padding: 40px 20px; } .question-text { font-size: 18px; } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <a href="index.html" class="back-link" id="back-link">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L4 7l5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Dashboard
      </a>
      <div class="header-title">Alpha Test 2026</div>
    </div>
    <div class="header-badge" id="gruppo-badge">Simulazione</div>
  </div>
  <div class="wrapper">
    <div id="start-screen">
      <h1>Alpha Test<br/>2026</h1>
      <p>Simulazione d'esame a risposta multipla. Le domande vengono selezionate casualmente dall'archivio completo.</p>
      <div class="info-boxes">
        <div class="info-box"><div class="num">30</div><div class="lbl">Domande</div></div>
        <div class="info-box"><div class="num" id="total-archive">—</div><div class="lbl">In archivio</div></div>
        <div class="info-box"><div class="num" id="total-temi">—</div><div class="lbl">Macrotemi</div></div>
      </div>
      <button class="btn-start" onclick="startTest()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><polygon points="6,4 14,9 6,14" fill="currentColor"/></svg>
        Inizia il test
      </button>
    </div>
    <div id="quiz-screen">
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="question-meta">
        <div class="q-number" id="q-number">Domanda 1 / 30</div>
        <div class="q-tema" id="q-tema">—</div>
        <div class="q-timer" id="q-timer">0s</div>
      </div>
      <div class="question-text" id="question-text">...</div>
      <div class="options-list" id="options-list"></div>
      <div class="feedback-row"><button class="btn-next" id="btn-next" onclick="nextQuestion()">Prossima →</button></div>
    </div>
    <div id="result-screen">
      <div class="result-header">
        <div class="result-circle"><div class="result-pct" id="r-pct">0%</div></div>
        <div class="result-title" id="r-title">—</div>
        <div class="result-sub" id="r-sub">—</div>
      </div>
      <div class="section-title">Performance per Macrotema</div>
      <div class="temi-grid" id="r-temi"></div>
      <div id="microsim-box"></div>
      <div class="section-title">Domande Sbagliate</div>
      <div class="errori-list" id="r-errori"></div>
      <div class="btn-group">
        <button class="btn-retry" onclick="resetTest()">Nuovo test</button>
        <button class="btn-dash" onclick="window.location.href=dashUrl">Dashboard</button>
      </div>
    </div>
  </div>
  <script>
    if (!localStorage.getItem('auth_user')) window.location.href = 'index.html';
    const authUser  = localStorage.getItem('auth_user')  || '';
    const gruppo    = localStorage.getItem('auth_gruppo') || '';
    const SUPABASE_URL = 'https://athqmxqratfyxnhmhwbn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_aVmmITMnZw0aqdxZoDNPkg_9_Cbarpn';
    const dashUrl   = gruppo === 'ISP' ? 'dashboard-isp.html' : gruppo === 'Interaziendale' ? 'dashboard-inter.html' : 'index.html';
    document.getElementById('gruppo-badge').textContent = gruppo || 'Simulazione';
    document.getElementById('back-link').href = dashUrl;
    let allQuestions = [], testQuestions = [], currentIndex = 0, answers = [];
    let questionStartTime = 0, timerInterval = null;
    const NUM_QUESTIONS = 30;

    fetch('domande.json?v=' + Date.now()).then(r => r.json()).then(data => {
      allQuestions = Array.isArray(data)
        ? data
        : Object.entries(data).flatMap(([cat, qs]) => qs.map(q => ({ ...q, macrotema: cat })));
      document.getElementById('total-archive').textContent = allQuestions.length;
      const temi = new Set(allQuestions.map(q => q.macrotema).filter(Boolean));
      document.getElementById('total-temi').textContent = temi.size;
    });

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
      return a;
    }

    function startTest() {
      testQuestions = shuffle(allQuestions).slice(0, NUM_QUESTIONS);
      currentIndex = 0; answers = [];
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      renderQuestion();
    }

    function startTimer() {
      questionStartTime = Date.now(); let secs = 0;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => { secs++; document.getElementById('q-timer').textContent = secs+'s'; }, 1000);
    }

    function renderQuestion() {
      const q = testQuestions[currentIndex];
      document.getElementById('progress-bar').style.width = ((currentIndex/testQuestions.length)*100)+'%';
      document.getElementById('q-number').textContent = `Domanda ${currentIndex+1} / ${testQuestions.length}`;
      document.getElementById('q-tema').textContent = q.macrotema || '';
      document.getElementById('q-timer').textContent = '0s';
      document.getElementById('question-text').textContent = q.domanda;
      document.getElementById('btn-next').style.display = 'none';
      startTimer();
      const list = document.getElementById('options-list');
      list.innerHTML = '';
      shuffle([...q.opzioni]).forEach((text, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn'; btn.dataset.text = text;
        btn.innerHTML = `<span class="letter">${String.fromCharCode(65+i)}</span><span>${text}</span>`;
        btn.onclick = () => selectAnswer(btn, q);
        list.appendChild(btn);
      });
    }

    function selectAnswer(clickedBtn, q) {
      clearInterval(timerInterval);
      const elapsed = Date.now() - questionStartTime;
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      const ok = clickedBtn.dataset.text === q.risposta_corretta;
      clickedBtn.classList.add(ok ? 'correct' : 'wrong');
      if (!ok) document.querySelectorAll('.option-btn').forEach(b => { if (b.dataset.text===q.risposta_corretta) b.classList.add('correct'); });
      answers.push({ correct: ok, tema: q.macrotema||'Altro', domanda: q.domanda, scelta: clickedBtn.dataset.text, corretta: q.risposta_corretta, tempoMs: elapsed });
      document.getElementById('btn-next').style.display = 'inline-flex';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= testQuestions.length) showResults();
      else renderQuestion();
    }

    function showResults() {
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('result-screen').style.display = 'block';
      const correct = answers.filter(a => a.correct).length;
      const total = answers.length;
      const pct = Math.round((correct / total) * 100);
      const avgTempo = Math.round(answers.reduce((s,a)=>s+a.tempoMs,0)/answers.length/1000);
      document.getElementById('r-pct').textContent = pct + '%';
      document.getElementById('r-sub').textContent = `${correct} corrette su ${total} · Tempo medio: ${avgTempo}s`;
      const titles = {85:'Risultato eccellente!',70:'Buon risultato!',60:'Risultato sufficiente',0:'Continua ad allenarti'};
      document.getElementById('r-title').textContent = Object.entries(titles).reverse().find(([k])=>pct>=+k)[1];
      const byTema = {};
      answers.forEach(a => {
        if (!byTema[a.tema]) byTema[a.tema]={correct:0,total:0,tempi:[]};
        byTema[a.tema].total++; if(a.correct)byTema[a.tema].correct++; byTema[a.tema].tempi.push(a.tempoMs);
      });
      const temiDiv = document.getElementById('r-temi');
      temiDiv.innerHTML = '';
      Object.entries(byTema).forEach(([tema,data]) => {
        const p = Math.round((data.correct/data.total)*100);
        const avgT = Math.round(data.tempi.reduce((s,v)=>s+v,0)/data.tempi.length/1000);
        const color = p>=70?'var(--green)':'var(--red)';
        temiDiv.innerHTML += `<div class="tema-box"><div class="tema-name">${tema}</div><div class="tema-score" style="color:${color}">${p}%</div><div class="tema-detail">${data.correct}/${data.total} corrette · ~${avgT}s/dom</div><div class="tema-bar"><div class="tema-bar-fill" style="width:${p}%;background:${color}"></div></div></div>`;
      });
      const temaPeggiore = Object.entries(byTema).sort((a,b)=>(a[1].correct/a[1].total)-(b[1].correct/b[1].total))[0];
      if (temaPeggiore) {
        const [nome,data] = temaPeggiore;
        const p = Math.round((data.correct/data.total)*100);
        if (p<80) document.getElementById('microsim-box').innerHTML = `<div class="microsim-suggest"><div class="txt"><strong>💡 Ti consigliamo una micro-simulazione</strong>Hai ottenuto il ${p}% su <em>${nome}</em>. Allenati su questo tema con 15 domande mirate.</div><button class="btn-microsim" onclick="goMicrosim('${nome}')">Allenati su ${nome} →</button></div>`;
      }
      const errori = answers.filter(a=>!a.correct);
      document.getElementById('r-errori').innerHTML = errori.length===0
        ? `<p style="color:var(--green);font-size:15px;font-weight:600">🎉 Nessun errore! Perfetto!</p>`
        : errori.map(e=>`<div class="errore-card"><div class="errore-domanda">${e.domanda}</div><div class="errore-row"><span class="errore-badge badge-wrong">Tua risposta</span><span style="color:var(--red)">${e.scelta}</span></div><div class="errore-row"><span class="errore-badge badge-correct">Risposta corretta</span><span style="color:var(--green);font-weight:500">${e.corretta}</span></div><div class="errore-tema">📂 ${e.tema}</div></div>`).join('');
      saveResult({ correct, total, pct, avgTempo, byTema, gruppo, data: new Date().toLocaleDateString('it-IT'), timestamp: Date.now().toString() });
    }

    function goMicrosim(tema) { sessionStorage.setItem('microsim_tema', tema); window.location.href = 'microsim.html'; }

    function saveResult(result) {
      const key = 'alpha_test_results_' + (authUser || 'default');
      const entry = { tipo: 'full', corrette: result.correct, totale: result.total, pct: result.pct, ts: Date.now(), byTema: result.byTema };
      const existing = JSON.parse(localStorage.getItem(key)||'[]');
      existing.push(entry); localStorage.setItem(key, JSON.stringify(existing));
      const all = JSON.parse(localStorage.getItem('alpha_test_results_ALL')||'[]');
      all.push({ ...entry, user: authUser, gruppo }); localStorage.setItem('alpha_test_results_ALL', JSON.stringify(all));
      sendToSupabase(gruppo || null, 'full', null, result.correct, result.total);
    }

    function sendToSupabase(gruppoVal, tipo, macrotema, punteggio, totale) {
      fetch(SUPABASE_URL + '/rest/v1/risultati', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ gruppo: gruppoVal, tipo_simulazione: tipo, macrotema: macrotema || null, punteggio, totale_domande: totale })
      }).catch(e => console.warn('Supabase sync failed:', e));
    }

    function resetTest() { document.getElementById('result-screen').style.display='none'; document.getElementById('start-screen').style.display='block'; }
  </script>
</body>
</html>
